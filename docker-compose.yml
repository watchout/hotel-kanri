version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hotel-kanri-db
    environment:
      POSTGRES_USER: hotel_kanri
      POSTGRES_PASSWORD: hotel_kanri_dev
      POSTGRES_DB: hotel_kanri
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hotel-kanri-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
