matrix:
- name: Markdown
  aspell:
    lang: en
    d: en_US
    extra-args:
    - --word-regexp=[a-zA-Z][a-zA-Z'-]*[a-zA-Z]|[a-zA-Z]
  dictionary:
    encoding: utf-8
    wordlists:
    - .github/workflows/wordlist.txt
  pipeline:
  - pyspelling.filters.markdown:
      markdown_extensions:
      - pymdownx.superfences
  - pyspelling.filters.html:
      comments: false
      ignores:
      - code
      - pre
  sources:
  - "docs/**/*.md"
  default_encoding: utf-8
