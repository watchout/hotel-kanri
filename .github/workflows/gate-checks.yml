name: Gate Checks

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  gate-quality:
    name: Gate Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run gate-quality (hotel-kanri scope)
        run: |
          echo "============================================"
          echo " Gate: Quality Check (CI mode)"
          echo "============================================"
          PASS=0; FAIL=0; WARN=0

          # 1. Framework files exist
          echo ""
          echo "=== 1. Framework Integrity ==="
          for F in .framework/plan.json .framework/gates.json .framework/autonomy.json; do
            if [ -f "$F" ]; then
              echo "  PASS: $F exists"
              PASS=$((PASS + 1))
            else
              echo "  FAIL: $F missing"
              FAIL=$((FAIL + 1))
            fi
          done

          # 2. Gate scripts exist and are executable
          echo ""
          echo "=== 2. Gate Scripts ==="
          for S in scripts/gates/gate-quality.sh scripts/gates/gate-release.sh; do
            if [ -f "$S" ]; then
              echo "  PASS: $S exists"
              PASS=$((PASS + 1))
            else
              echo "  FAIL: $S missing"
              FAIL=$((FAIL + 1))
            fi
          done

          # 3. SSOT files exist
          echo ""
          echo "=== 3. SSOT Files ==="
          SSOT_COUNT=$(find docs/ -name "SSOT*.md" -o -name "SSOT_*.md" | wc -l | tr -d ' ')
          if [ "$SSOT_COUNT" -gt 5 ]; then
            echo "  PASS: $SSOT_COUNT SSOT files found"
            PASS=$((PASS + 1))
          else
            echo "  FAIL: Only $SSOT_COUNT SSOT files"
            FAIL=$((FAIL + 1))
          fi

          # 4. plan.json has status tracking
          echo ""
          echo "=== 4. Plan Status ==="
          DONE=$(cat .framework/plan.json | jq '[.waves[0].features[] | select(.status == "done")] | length')
          TODO=$(cat .framework/plan.json | jq '[.waves[0].features[] | select(.status == "todo")] | length')
          echo "  Done: $DONE, Todo: $TODO"
          if [ "$DONE" -gt 0 ]; then
            echo "  PASS: Plan has tracked progress"
            PASS=$((PASS + 1))
          else
            echo "  WARN: No features marked as done"
            WARN=$((WARN + 1))
          fi

          echo ""
          echo "============================================"
          echo " Result: PASS=$PASS FAIL=$FAIL WARN=$WARN"
          echo "============================================"
          if [ "$FAIL" -gt 0 ]; then exit 1; fi

  gate-release:
    name: Gate Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: gate-quality
    steps:
      - uses: actions/checkout@v4

      - name: Run gate-release
        env:
          STG_API_URL: https://stg-api.omotenasuai.com
          STG_APP_URL: https://stg-app.omotenasuai.com
        run: bash scripts/gates/gate-release.sh
