name: ドキュメント検証

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'docs/**'
      - '**.md'

jobs:
  markdown-lint:
    name: Markdown リンター
    if: ${{ !contains(github.event.pull_request.title, 'qos gatekeeper') }}
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v3

      - name: Markdown リンターのセットアップ
        uses: nosborn/github-action-markdown-cli@v3.2.0
        with:
          files: "docs/**/*.md"
          config_file: .markdownlint.json
          ignore_files: "node_modules/** backups/** .nuxt/** docs/03_ssot_legacy/** docs/_archived_system_docs/** docs/01_systems/** docs/00_shared/architecture/** docs/standards/**"

  broken-links:
    name: リンク切れチェック
    if: ${{ !contains(github.event.pull_request.title, 'qos gatekeeper') }}
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v3

      - name: markdown-link-check インストール
        run: npm install -g markdown-link-check@3.11.2

      - name: リンク切れチェックのセットアップ
        run: |
          set +e
          ERRORS=0
          while IFS= read -r -d '' file; do
            markdown-link-check "$file" --config .github/workflows/mlc_config.json -q -v
            if [ $? -ne 0 ]; then
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find docs -name '*.md' \
            -not -path '*/03_ssot_legacy/*' \
            -not -path '*/01_systems/*' \
            -not -path '*/00_shared/architecture/*' \
            -not -path '*/standards/*' \
            -not -path '*/_archived_system_docs/*' \
            -not -path '*/node_modules/*' \
            -print0)
          if [ $ERRORS -gt 0 ]; then
            echo "::error::リンク切れが $ERRORS ファイルで検出されました"
            exit 1
          fi

  spellcheck:
    name: スペルチェック
    if: ${{ !contains(github.event.pull_request.title, 'qos gatekeeper') }}
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v3

      - name: スペルチェックのセットアップ
        uses: rojopolis/spellcheck-github-actions@0.28.0
        with:
          config_path: .github/workflows/spellcheck.yml
          task_name: Markdown

  notify:
    name: 通知
    runs-on: ubuntu-latest
    needs: [markdown-lint, broken-links, spellcheck]
    if: ${{ failure() }}
    steps:
      - name: Slack通知
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: ${{ failure() }}
